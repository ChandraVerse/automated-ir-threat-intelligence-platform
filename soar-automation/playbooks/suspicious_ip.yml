# SOAR Playbook: Suspicious IP Response
# Triggered when verdict_engine scores an IP as SUSPICIOUS (35–69)
name: suspicious_ip_response
version: "1.0"
trigger:
  verdict: SUSPICIOUS
  ioc_type: ip

steps:
  - id: enrich_further
    action: intel.deep_enrich
    params:
      ioc: "{{ ioc.value }}"
      sources: [virustotal, abuseipdb, shodan]

  - id: create_ticket
    action: jira.create_ticket
    params:
      project: SEC
      issuetype: Task
      summary: "[AUTO] Suspicious IP {{ ioc.value }} — Needs Review"
      description: |
        **IOC:** {{ ioc.value }}
        **Score:** {{ ioc.score }} (SUSPICIOUS — manual review required)
        **VirusTotal detections:** {{ enrichment.virustotal.positives }}
        **AbuseIPDB confidence:** {{ enrichment.abuseipdb.abuse_confidence_score }}
      priority: Medium
      labels: [automated, threat-intel, suspicious-ip]

  - id: notify_analyst
    action: slack.notify
    depends_on: [create_ticket]
    params:
      channel: "#soc-alerts"
      message: |
        ⚠️ *SUSPICIOUS IP* — `{{ ioc.value }}` (Score: `{{ ioc.score }}`)
        Ticket created: `{{ steps.create_ticket.key }}` — analyst review required
