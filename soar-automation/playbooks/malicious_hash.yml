# SOAR Playbook: Malicious File Hash Response
name: malicious_hash_response
version: "1.0"
trigger:
  verdict: MALICIOUS
  ioc_type: hash

steps:
  - id: quarantine_file
    action: edr.quarantine
    params:
      hash: "{{ ioc.value }}"
      reason: "Malicious hash detected — VT score {{ enrichment.virustotal.positives }}"

  - id: hunt_hash
    action: edr.hunt
    depends_on: [quarantine_file]
    params:
      hash: "{{ ioc.value }}"
      scope: enterprise

  - id: create_ticket
    action: jira.create_ticket
    params:
      project: SEC
      issuetype: Incident
      summary: "[AUTO] Malicious Hash {{ ioc.value[:16] }}... — Score {{ ioc.score }}"
      description: |
        **Hash:** {{ ioc.value }}
        **Score:** {{ ioc.score }}
        **VT Family:** {{ enrichment.virustotal.suggested_threat_label }}
        **VT Detections:** {{ enrichment.virustotal.positives }}/{{ enrichment.virustotal.total }}
      priority: High
      labels: [automated, malware, file-hash]

  - id: notify_soc
    action: slack.notify
    params:
      channel: "#soc-alerts"
      message: |
        🦠 *MALICIOUS HASH QUARANTINED* — `{{ ioc.value[:16] }}...`
        Score: `{{ ioc.score }}/100` | VT: {{ enrichment.virustotal.positives }} detections
        Ticket: `{{ steps.create_ticket.key }}`
