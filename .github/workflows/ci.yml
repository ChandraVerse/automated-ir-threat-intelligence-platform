name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests pyyaml
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint with flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 wazuh_integration ioc_pipeline soar_automation report_generator memory_analysis pipeline tests \
            --max-line-length=120 \
            --extend-ignore=E101,E121,E122,E123,E124,E125,E126,E127,E128,E129,E131,E203,E221,E222,E225,E226,E231,E241,E251,E261,E262,E265,E266,E271,E272,E301,E302,E303,E304,E305,E306,E401,E402,E501,E701,E702,E711,E712,E721,E731,W191,W291,W292,W293,W391,W503,W504,F401,F403,F405,F541,F811,F841

  bandit:
    name: Security scan with bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: |
          bandit -r wazuh_integration ioc_pipeline soar_automation report_generator memory_analysis pipeline \
            --skip B101,B104,B105,B106,B107,B404,B603,B501,B310 \
            -q
