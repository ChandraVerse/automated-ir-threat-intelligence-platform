# Wazuh integration configuration
# Copy to config/config.yml and fill in your values

wazuh:
  host: "https://localhost:55000"
  user: "wazuh"
  password: "YOUR_WAZUH_PASSWORD"
  verify_ssl: false
  # Severity levels to ingest (1=low ... 15=critical)
  min_severity: 5
  # Polling interval in seconds (used in webhook/poll modes)
  poll_interval: 10
  # Maximum alerts to fetch per poll cycle
  max_alerts_per_poll: 100
  # Active Response config
  active_response:
    enabled: true
    timeout: 30
